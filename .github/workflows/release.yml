name: Release practice ROM

on:
  push:
    branches:
      - master
    paths-ignore:
      - "*.md"
      - ".gitignore"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ARES_VERSION: v148
  ARES_PREFIX: ${{ github.workspace }}/.cache/ares-v148

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      name: ${{ steps.release.outputs.name }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      make_latest: ${{ steps.release.outputs.make_latest }}
      file_prefix: ${{ steps.release.outputs.file_prefix }}
      body: ${{ steps.release.outputs.body }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Determine release metadata
        id: release
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "name=build ${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
            echo "file_prefix=goldeneye_practice_rom_build_${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            first_entry=$(awk '/^# /{if(found) exit; found=1} found{print}' CHANGELOG.md)
            version=$(echo "$first_entry" | head -n1 | sed 's/^# //')
            body=$(echo "$first_entry" | tail -n +2)
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "name=v$version" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
            echo "file_prefix=goldeneye_practice_rom_v$version" >> "$GITHUB_OUTPUT"
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            echo "$body" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "[How to install](https://github.com/jakzo/goldeneneye-practice-rom#how-to-install)" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

  build-ares:
    runs-on: ubuntu-24.04

    steps:
      - name: Cache ares
        id: cache-ares
        uses: actions/cache@v6
        with:
          path: ${{ env.ARES_PREFIX }}
          key: ares-${{ runner.os }}-${{ runner.arch }}-${{ env.ARES_VERSION }}

      - name: Install ares build dependencies
        if: steps.cache-ares.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes \
            build-essential \
            cmake \
            libcanberra-gtk3-module \
            libcapstone-dev \
            libgl-dev \
            libgtk-3-dev \
            mesa-vulkan-drivers \
            ninja-build \
            pkg-config

      - name: Build ares
        if: steps.cache-ares.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --retry 3 \
            "https://github.com/ares-emulator/ares/archive/refs/tags/${ARES_VERSION}.tar.gz" \
            | tar --extract --gzip --directory /tmp
          cmake \
            -S "/tmp/ares-${ARES_VERSION#v}" \
            -B /tmp/ares-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$ARES_PREFIX" \
            -DARES_CORES=n64 \
            -DARES_BUILD_LOCAL=OFF \
            -DARES_BUNDLE_SHADERS=OFF \
            -DARES_ENABLE_LIBRASHADER=OFF \
            -DENABLE_IPO=OFF \
            -DARES_ENABLE_ALSA=OFF \
            -DARES_ENABLE_AO=OFF \
            -DARES_ENABLE_OPENAL=OFF \
            -DARES_ENABLE_OSS=OFF \
            -DARES_ENABLE_PULSEAUDIO=OFF \
            -DARES_ENABLE_SDL=OFF \
            -DARES_ENABLE_UDEV=OFF
          cmake --build /tmp/ares-build --parallel 2
          cmake --install /tmp/ares-build

  build-and-test:
    needs:
      - metadata
      - build-ares
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build:
          - mode: release
            dev: 0
          - mode: dev
            dev: 1
        region:
          - version: US
            code: u
            slug: us
            secret: BASE_ROM_US_DOWNLOAD_LINK
          - version: EU
            code: e
            slug: pal
            secret: BASE_ROM_EU_DOWNLOAD_LINK
          - version: JP
            code: j
            slug: jp
            secret: BASE_ROM_JP_DOWNLOAD_LINK

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes \
            ffmpeg \
            libcanberra-gtk3-module \
            libcapstone-dev \
            libgl-dev \
            libgtk-3-dev \
            make \
            mesa-vulkan-drivers \
            xauth \
            xdelta3 \
            xvfb

      - name: Build pinned ROM toolchain image
        run: docker build --target goldeneye --tag goldeneye .

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Download base ROMs
        env:
          BASE_ROM_US_URL: ${{ secrets.BASE_ROM_US_DOWNLOAD_LINK }}
          TARGET_BASE_ROM_URL: ${{ secrets[matrix.region.secret] }}
          TARGET_BASE_ROM: baserom.${{ matrix.region.code }}.z64
        run: |
          if [ -z "$BASE_ROM_US_URL" ]; then
            echo "::error::BASE_ROM_US_DOWNLOAD_LINK is required."
            exit 1
          fi
          if [ -z "$TARGET_BASE_ROM_URL" ]; then
            echo "::error::${{ matrix.region.secret }} is required."
            exit 1
          fi
          curl --fail --location --retry 3 --output baserom.u.z64 "$BASE_ROM_US_URL"
          if [ "$TARGET_BASE_ROM" != "baserom.u.z64" ]; then
            curl --fail --location --retry 3 --output "$TARGET_BASE_ROM" "$TARGET_BASE_ROM_URL"
          fi
          test "$(stat --format=%s baserom.u.z64)" -ge 1000000
          test "$(stat --format=%s "$TARGET_BASE_ROM")" -ge 1000000
          sha256sum baserom.u.z64 "$TARGET_BASE_ROM"

      - name: Extract assets
        env:
          REGION_CODE: ${{ matrix.region.code }}
        run: |
          ./scripts/extract_baserom.u.sh
          if [ "$REGION_CODE" = "e" ]; then
            ./scripts/extract_diff.e.sh
          elif [ "$REGION_CODE" = "j" ]; then
            ./scripts/extract_diff.j.sh
          fi

      - name: Build IDO reference ROM (${{ matrix.build.mode }}, ${{ matrix.region.version }})
        run: >-
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/home/dev" goldeneye
          make -j$(nproc)
          IDO_RECOMP=YES
          ORIGINAL_CC=ido
          BUILD_DIR_BASE=build/ido
          VERSION=${{ matrix.region.version }}
          DEV=${{ matrix.build.dev }}

      - name: Build mixed practice ROM (${{ matrix.build.mode }}, ${{ matrix.region.version }})
        run: >-
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/home/dev" goldeneye
          make -j$(nproc)
          IDO_RECOMP=YES
          ORIGINAL_CC=mixed
          VERSION=${{ matrix.region.version }}
          DEV=${{ matrix.build.dev }}

      - name: Verify migration harness
        if: matrix.build.mode == 'release' && matrix.region.version == 'US'
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/home/dev" goldeneye make abi-check ORIGINAL_CC=mixed
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/home/dev" goldeneye make gcc-global-asm-proof ORIGINAL_CC=mixed

      - name: Compare IDO and mixed artifacts
        run: >-
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD:/home/dev" goldeneye
          make migration-report
          ORIGINAL_CC=mixed
          VERSION=${{ matrix.region.version }}
          DEV=${{ matrix.build.dev }}

      - name: Upload migration manifests and reports
        uses: actions/upload-artifact@v6
        with:
          name: migration-report-${{ matrix.build.mode }}-${{ matrix.region.slug }}-${{ github.run_attempt }}
          path: |
            build/${{ matrix.region.code }}/.build_config
            build/${{ matrix.region.code }}/ge007.${{ matrix.region.code }}.map
            build/${{ matrix.region.code }}/migration/
            build/ido/${{ matrix.region.code }}/.build_config
            build/ido/${{ matrix.region.code }}/ge007.${{ matrix.region.code }}.map
          if-no-files-found: error

      - name: Generate xdelta patch
        env:
          BASE_ROM: baserom.${{ matrix.region.code }}.z64
          BUILT_ROM: build/${{ matrix.region.code }}/ge007.${{ matrix.region.code }}.z64
          PATCH_FILE: ${{ needs.metadata.outputs.file_prefix }}_${{ matrix.region.slug }}_${{ matrix.build.mode }}.xdelta
        run: |
          xdelta3 -e -n -S none -A -s "$BASE_ROM" "$BUILT_ROM" "$PATCH_FILE"
          npx --yes rom-patcher@3.1.0-b patch "$BASE_ROM" "$PATCH_FILE"
          patched_rom="${BASE_ROM%.z64} (patched).z64"
          sha256sum "$BUILT_ROM" "$patched_rom"
          cmp "$BUILT_ROM" "$patched_rom"
          ls -lh "$PATCH_FILE"

      - name: Upload patch artifact
        uses: actions/upload-artifact@v6
        with:
          name: goldeneye-practice-rom-patch-${{ matrix.build.mode }}-${{ matrix.region.slug }}-${{ github.run_attempt }}
          path: ${{ needs.metadata.outputs.file_prefix }}_${{ matrix.region.slug }}_${{ matrix.build.mode }}.xdelta
          if-no-files-found: error

      - name: Restore ares cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.ARES_PREFIX }}
          key: ares-${{ runner.os }}-${{ runner.arch }}-${{ env.ARES_VERSION }}
          fail-on-cache-miss: true

      - name: Run practice tests (${{ matrix.build.mode }}, ${{ matrix.region.version }})
        env:
          ARES: ${{ env.ARES_PREFIX }}/bin/ares
          ARES_ARGS: >-
            --fullscreen
            --no-file-prompt
            --setting Audio/Driver=None
            --setting Input/Driver=None
          XDG_CONFIG_HOME: /tmp/ares-config
          XDG_DATA_HOME: /tmp/ares-data
          PRACTICE_TEST_VIDEO_DIR: ${{ runner.temp }}/practice-test-artifacts/videos
          PRACTICE_TEST_VIDEO_SIZE: 640x480
          SUMMARY_FILE: ${{ runner.temp }}/practice-test-summary-${{ matrix.build.mode }}-${{ matrix.region.slug }}.md
        run: |
          printf '# Practice ROM tests — %s / %s\n\n' '${{ matrix.build.mode }}' '${{ matrix.region.version }}' >> "$GITHUB_STEP_SUMMARY"
          set +e
          xvfb-run --auto-servernum \
            --server-args="-screen 0 640x480x24 -nolisten tcp -ac" \
            ./scripts/run_practice_tests.py \
              --skip-build \
              --build-mode "${{ matrix.build.mode }}" \
              --version "${{ matrix.region.version }}" \
              --timeout 120 \
              --jobs 1 \
              --exclude REPLAY_RUNWAY \
              --junit-xml "$RUNNER_TEMP/practice-test-artifacts/results.xml"
          test_status=$?
          cp "$GITHUB_STEP_SUMMARY" "$SUMMARY_FILE"
          exit "$test_status"

      - name: Prepare missing test result summary
        if: always()
        env:
          SUMMARY_FILE: ${{ runner.temp }}/practice-test-summary-${{ matrix.build.mode }}-${{ matrix.region.slug }}.md
        run: |
          if [ ! -s "$SUMMARY_FILE" ]; then
            printf '# Practice ROM tests — %s / %s\n\n' \
              '${{ matrix.build.mode }}' '${{ matrix.region.version }}' > "$SUMMARY_FILE"
            printf 'Tests did not finish because the build job failed before producing a test summary.\n' \
              >> "$SUMMARY_FILE"
          fi

      - name: Upload test result summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: practice-test-summary-${{ matrix.build.mode }}-${{ matrix.region.slug }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/practice-test-summary-${{ matrix.build.mode }}-${{ matrix.region.slug }}.md
            ${{ runner.temp }}/practice-test-artifacts/*.xml
          if-no-files-found: warn

      - name: Upload failed test artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: practice-test-failures-${{ matrix.build.mode }}-${{ matrix.region.slug }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/practice-test-artifacts
          if-no-files-found: warn
          compression-level: 0

  release:
    needs:
      - metadata
      - build-and-test
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      needs.metadata.result == 'success' &&
      (needs.metadata.outputs.prerelease == 'true' || needs.build-and-test.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download prerelease patches
        if: needs.metadata.outputs.prerelease == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: goldeneye-practice-rom-patch-*-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release
          merge-multiple: true

      - name: Download stable release patches
        if: needs.metadata.outputs.prerelease != 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: goldeneye-practice-rom-patch-release-*-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release
          merge-multiple: true

      - name: Download test result summaries
        if: needs.metadata.outputs.prerelease == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: practice-test-summary-*-${{ github.run_attempt }}
          path: ${{ runner.temp }}/summaries
          merge-multiple: true

      - name: Prepare release notes
        env:
          RELEASE_BODY: ${{ needs.metadata.outputs.body }}
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
        run: |
          printf '%s' "$RELEASE_BODY" > "$RUNNER_TEMP/release-notes.md"
          if [ "$PRERELEASE" = "true" ]; then
            mkdir -p "$RUNNER_TEMP/summaries"
            summary_count=$(find "$RUNNER_TEMP/summaries" -type f -name '*.md' | wc -l)
            if [ "$summary_count" -ne 6 ]; then
              echo "::warning::Expected 6 test summaries, found $summary_count. Publishing available summaries."
            fi
            printf '\n\n---\n\n' >> "$RUNNER_TEMP/release-notes.md"
            if [ "$summary_count" -gt 0 ]; then
              find "$RUNNER_TEMP/summaries" -type f -name '*.md' -print0 \
                | sort -z \
                | xargs -0 cat >> "$RUNNER_TEMP/release-notes.md"
            else
              printf 'Test summaries were unavailable because the build jobs failed before testing finished.\n' \
                >> "$RUNNER_TEMP/release-notes.md"
            fi
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: ${{ needs.metadata.outputs.name }}
          prerelease: ${{ needs.metadata.outputs.prerelease }}
          make_latest: ${{ needs.metadata.outputs.make_latest }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: ${{ runner.temp }}/release/*.xdelta
