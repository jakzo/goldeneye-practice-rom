name: Release practice ROM patch

on:
  push:
    branches:
      - master
    paths-ignore:
      - "*.md"
      - ".github/**"
      - ".gitignore"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ARES_VERSION: v148
  ARES_PREFIX: ${{ github.workspace }}/.cache/ares-v148

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check base ROM secret
        env:
          BASE_ROM_URL: ${{ secrets.BASE_ROM_US_DOWNLOAD_LINK }}
        run: |
          if [ -z "$BASE_ROM_URL" ]; then
            echo "::error::BASE_ROM_US_DOWNLOAD_LINK is required to build the test ROM."
            exit 1
          fi

      - name: Download US base ROM
        env:
          BASE_ROM_URL: ${{ secrets.BASE_ROM_US_DOWNLOAD_LINK }}
        run: |
          curl --fail --location --retry 3 \
            --output baserom.u.z64 "$BASE_ROM_URL"
          test "$(stat --format=%s baserom.u.z64)" -ge 1000000

      - name: Extract US assets
        run: ./scripts/extract_baserom.u.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes \
            binutils-mips-linux-gnu \
            build-essential \
            cmake \
            g++-mips-linux-gnu \
            gcc-mips-linux-gnu \
            ffmpeg \
            libcanberra-gtk3-module \
            libcapstone-dev \
            libgl-dev \
            libgtk-3-dev \
            mesa-vulkan-drivers \
            ninja-build \
            pkg-config \
            xauth \
            xvfb

      - name: Cache ares
        id: cache-ares
        uses: actions/cache@v4
        with:
          path: ${{ env.ARES_PREFIX }}
          key: ares-${{ runner.os }}-${{ runner.arch }}-${{ env.ARES_VERSION }}

      - name: Build ares
        if: steps.cache-ares.outputs.cache-hit != 'true'
        run: |
          curl --fail --location --retry 3 \
            "https://github.com/ares-emulator/ares/archive/refs/tags/${ARES_VERSION}.tar.gz" \
            | tar --extract --gzip --directory /tmp
          cmake \
            -S "/tmp/ares-${ARES_VERSION#v}" \
            -B /tmp/ares-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$ARES_PREFIX" \
            -DARES_CORES=n64 \
            -DARES_BUILD_LOCAL=OFF \
            -DARES_BUNDLE_SHADERS=OFF \
            -DARES_ENABLE_LIBRASHADER=OFF \
            -DENABLE_IPO=OFF \
            -DARES_ENABLE_ALSA=OFF \
            -DARES_ENABLE_AO=OFF \
            -DARES_ENABLE_OPENAL=OFF \
            -DARES_ENABLE_OSS=OFF \
            -DARES_ENABLE_PULSEAUDIO=OFF \
            -DARES_ENABLE_SDL=OFF \
            -DARES_ENABLE_UDEV=OFF
          cmake --build /tmp/ares-build --parallel 2
          cmake --install /tmp/ares-build

      - name: Run practice tests
        env:
          ARES: ${{ env.ARES_PREFIX }}/bin/ares
          ARES_ARGS: >-
            --fullscreen
            --no-file-prompt
            --setting Audio/Driver=None
            --setting Input/Driver=None
          XDG_CONFIG_HOME: /tmp/ares-config
          XDG_DATA_HOME: /tmp/ares-data
          PRACTICE_TEST_VIDEO_DIR: ${{ runner.temp }}/practice-test-artifacts/videos
          PRACTICE_TEST_VIDEO_SIZE: 640x480
        run: |
          xvfb-run --auto-servernum \
            --server-args="-screen 0 640x480x24 -nolisten tcp -ac" \
            ./scripts/run_practice_tests.py \
              --jobs 1 \
              --junit-xml "$RUNNER_TEMP/practice-test-artifacts/results.xml"

      - name: Upload failed test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: practice-test-failures-${{ github.run_attempt }}
          path: ${{ runner.temp }}/practice-test-artifacts
          if-no-files-found: warn
          compression-level: 0

  build-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install binutils-mips-linux-gnu gcc-mips-linux-gnu make xdelta3
          wget -q https://github.com/n64decomp/qemu-irix/releases/download/v2.11-deb/qemu-irix-2.11.0-2169-g32ab296eef_amd64.deb
          sudo dpkg -i qemu-irix-2.11.0-2169-g32ab296eef_amd64.deb

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download US base ROM
        run: |
          success=false
          for i in {1..3}; do
            if wget -q -O baserom.u.z64 "${{ secrets.BASE_ROM_US_DOWNLOAD_LINK }}" && [ -f baserom.u.z64 ] && [ $(wc -c < baserom.u.z64) -ge 1000000 ]; then
              success=true
              break
            fi
            echo "Download failed or file too small (attempt $i). Retrying in 5 seconds..."
            sleep 5
          done
          if [ "$success" != "true" ]; then
            echo "Error: Failed to download a valid base ROM of at least 1MB after 3 attempts."
            exit 1
          fi
          ls -lh baserom.u.z64
          sha256sum baserom.u.z64

      - name: Extract US assets
        run: ./scripts/extract_baserom.u.sh

      - name: Build practice ROM (IDO via QEMU)
        run: make -j$(nproc) IDO_RECOMP=NO

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=build-${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "name=build ${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
            echo "filename=goldeneye_practice_rom_build_${{ github.run_number }}.xdelta" >> $GITHUB_OUTPUT
          else
            # Extract the latest changelog entry (from first # header to next # or EOF)
            FIRST_ENTRY=$(awk '/^# /{if(found) exit; found=1} found{print}' CHANGELOG.md)
            # Version is the header line, stripped of "# "
            VERSION=$(echo "$FIRST_ENTRY" | head -n1 | sed 's/^# //')
            # Body is everything after the header line
            BODY=$(echo "$FIRST_ENTRY" | tail -n +2)
            echo "tag=v$VERSION" >> $GITHUB_OUTPUT
            echo "name=v$VERSION" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
            echo "filename=goldeneye_practice_rom_v$VERSION.xdelta" >> $GITHUB_OUTPUT
            # Write multi-line body via heredoc syntax
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$BODY" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "[How to install](https://github.com/jakzo/goldeneneye-practice-rom#how-to-install)" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Generate xdelta patch
        run: |
          xdelta3 -e -n -S none -A \
            -s baserom.u.z64 \
            build/u/ge007.u.z64 \
            "${{ steps.tag.outputs.filename }}"
          ls -lh "${{ steps.tag.outputs.filename }}"

      - name: Verify patch produces built ROM
        run: |
          npx --yes rom-patcher@3.1.0-b patch baserom.u.z64 "${{ steps.tag.outputs.filename }}"
          sha256sum build/u/ge007.u.z64 "baserom.u (patched).z64"
          cmp build/u/ge007.u.z64 "baserom.u (patched).z64"

      - name: Upload patch artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: goldeneye-practice-rom-pr-${{ github.event.pull_request.number }}
          path: ${{ steps.tag.outputs.filename }}
          if-no-files-found: error

      - name: Publish release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          make_latest: ${{ steps.tag.outputs.make_latest }}
          body: ${{ steps.tag.outputs.body }}
          files: ${{ steps.tag.outputs.filename }}
