  <title id="title">GoldenEye 007 Practice ROM</title>
  <desc id="description">The gold GoldenEye 007 logo above the words Practice ROM and a grey N64 controller, with a glowing green P.</desc>

  <defs>
    <filter id="logo-shadow" x="-10%" y="-15%" width="125%" height="135%"
            color-interpolation-filters="sRGB">
      <feDropShadow dx="1.2" dy="1.4" stdDeviation="0.9"
                    flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <filter id="text-shadow" x="-10%" y="-20%" width="125%" height="145%"
            color-interpolation-filters="sRGB">
      <feDropShadow dx="1.2" dy="1.5" stdDeviation="1"
                    flood-color="#000" flood-opacity="0.9"/>
    </filter>
    <filter id="green-glow" x="-45%" y="-35%" width="190%" height="180%"
            color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feFlood flood-color="#39b54a" flood-opacity="0.65" result="green"/>
      <feComposite in="green" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
